<!-- DeepLore Enhanced — Drawer Panel -->

<!-- ═══════════════════════════════════════════════════════════════════════════
     ZONE 1: Fixed Status (always visible)
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="dle_drawer_status" class="dle-drawer-zone dle-zone-status" role="status" aria-label="DeepLore pipeline status">

    <!-- Pipeline stage + stats merged into one compact row -->
    <div class="dle-status-row">
        <span class="dle-status-dot" title="System status" role="img" aria-label="System status: unknown"></span>
        <span class="dle-pipeline-label" aria-label="Pipeline stage">Idle</span>
        <span class="dle-stat-divider" aria-hidden="true">|</span>
        <span class="dle-stat" data-stat="entries" title="Vault entries indexed" aria-label="0 vault entries indexed">0</span>
        <span class="dle-stat" title="Last injection count" aria-label="0 entries injected"><i class="fa-solid fa-syringe dle-stat-icon" aria-hidden="true"></i> <span data-stat="injected">0</span></span>
        <span class="dle-stat" data-stat="mode" title="AI search mode" aria-label="Search mode: unknown">—</span>
    </div>

    <!-- Token budget bar -->
    <div class="dle-token-bar-container" role="progressbar" aria-valuenow="0" aria-valuemax="0" aria-valuemin="0" aria-label="Token budget">
        <div class="dle-token-bar" style="width: 0%;"></div>
        <span class="dle-token-bar-label">— / — tokens</span>
    </div>

    <!-- Active gating filters (only shown when set) -->
    <div class="dle-active-filters" aria-label="Active gating filters"></div>

    <!-- Quick actions -->
    <div class="dle-action-row" role="toolbar" aria-label="Quick actions">
        <button class="menu_button menu_button_icon dle-action-btn" data-action="refresh" title="Refresh vault index" aria-label="Refresh vault index">
            <i class="fa-solid fa-sync" aria-hidden="true"></i>
        </button>
        <button class="menu_button menu_button_icon dle-action-btn" data-action="settings" title="Open settings" aria-label="Open settings">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
        </button>
        <button class="menu_button menu_button_icon dle-action-btn" data-action="scribe" title="Run Scribe now" aria-label="Run Scribe">
            <i class="fa-solid fa-feather-pointed" aria-hidden="true"></i>
        </button>
        <button class="menu_button menu_button_icon dle-action-btn" data-action="newlore" title="Create new lore entry" aria-label="Create new lore entry">
            <i class="fa-solid fa-plus" aria-hidden="true"></i>
        </button>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Separator
     ═══════════════════════════════════════════════════════════════════════════ -->
<div class="dle-zone-divider" aria-hidden="true"></div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     ZONE 2: Tabbed Content
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="dle_drawer_tabs" class="dle-drawer-zone dle-zone-tabs">

    <!-- Tab bar -->
    <div class="dle-tab-bar" role="tablist" aria-label="DeepLore panels">
        <button class="dle-tab active" id="dle-tab-injection" data-tab="injection" role="tab"
                aria-selected="true" aria-controls="dle-panel-injection" aria-label="Injection" tabindex="0">
            <i class="fa-solid fa-syringe" aria-hidden="true"></i>
        </button>
        <button class="dle-tab" id="dle-tab-browse" data-tab="browse" role="tab"
                aria-selected="false" aria-controls="dle-panel-browse" aria-label="Browse" tabindex="-1">
            <i class="fa-solid fa-book-open" aria-hidden="true"></i>
        </button>
        <button class="dle-tab" id="dle-tab-gating" data-tab="gating" role="tab"
                aria-selected="false" aria-controls="dle-panel-gating" aria-label="Gating" tabindex="-1">
            <i class="fa-solid fa-filter" aria-hidden="true"></i>
        </button>
        <button class="dle-tab" id="dle-tab-tools" data-tab="tools" role="tab"
                aria-selected="false" aria-controls="dle-panel-tools" aria-label="Tools" tabindex="-1">
            <i class="fa-solid fa-toolbox" aria-hidden="true"></i>
        </button>
    </div>

    <!-- Active tab label -->
    <div class="dle-tab-label" aria-hidden="true">Injection</div>

    <!-- ─── Tab: Injection (Context Cartographer) ─── -->
    <div class="dle-tab-panel active" id="dle-panel-injection" data-tab="injection"
         role="tabpanel" aria-labelledby="dle-tab-injection">
        <div class="dle-panel-toolbar">
            <span class="dle-text-sm">Last Generation</span>
            <span class="dle-section-diff"></span>
            <button class="dle-tab-expand" data-expand="injection" title="Open full Cartographer popup" aria-label="Open full Cartographer popup">
                <i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>
            </button>
        </div>
        <div class="dle-carto-list" role="list" aria-label="Injected entries"></div>
        <!-- Empty state (shown when no sources) -->
        <div class="dle-empty-state">
            <i class="fa-solid fa-inbox" aria-hidden="true"></i>
            <p>No entries injected yet. Send a message to trigger the pipeline.</p>
        </div>
    </div>

    <!-- ─── Tab: Browse ─── -->
    <div class="dle-tab-panel" id="dle-panel-browse" data-tab="browse"
         role="tabpanel" aria-labelledby="dle-tab-browse" hidden>
        <div class="dle-panel-toolbar">
            <input type="text" class="text_pole dle-browse-input" placeholder="Search entries..." aria-label="Search vault entries" />
            <button class="dle-tab-expand" data-expand="browse" title="Open full Browse popup" aria-label="Open full Browse popup">
                <i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>
            </button>
        </div>
        <div class="dle-browse-filters">
            <select class="text_pole dle-browse-filter-select" data-filter="status" aria-label="Filter by status">
                <option value="all">Status</option>
                <option value="injected">Injected</option>
                <option value="pinned">Pinned</option>
                <option value="blocked">Blocked</option>
                <option value="constant">Constants</option>
                <option value="seed">Seeds</option>
                <option value="bootstrap">Bootstrap</option>
            </select>
            <select class="text_pole dle-browse-filter-select" data-filter="tag" aria-label="Filter by tag">
                <option value="">Tags</option>
            </select>
            <select class="text_pole dle-browse-sort-select" data-sort aria-label="Sort entries">
                <option value="priority_asc">Sort</option>
                <option value="priority_desc">Priority &#x2193;</option>
                <option value="alpha_asc">A &#x2192; Z</option>
                <option value="alpha_desc">Z &#x2192; A</option>
                <option value="tokens_desc">Tokens &#x2193;</option>
                <option value="tokens_asc">Tokens &#x2191;</option>
            </select>
        </div>
        <div class="dle-browse-list" role="list" aria-label="Vault entries"></div>
        <!-- Empty state -->
        <div class="dle-empty-state">
            <i class="fa-solid fa-database" aria-hidden="true"></i>
            <p>No entries loaded. Connect to Obsidian in Settings.</p>
        </div>
    </div>

    <!-- ─── Tab: Gating ─── -->
    <div class="dle-tab-panel" id="dle-panel-gating" data-tab="gating"
         role="tabpanel" aria-labelledby="dle-tab-gating" hidden>
        <div class="dle-panel-toolbar">
            <span class="dle-text-sm">Contextual Gating</span>
            <button class="dle-tab-expand" data-expand="gating" title="Open full Context State popup" aria-label="Open full Context State popup">
                <i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>
            </button>
        </div>
        <div class="dle-gating-group" data-field="era">
            <span class="dle-gating-label" id="dle-gating-era">Era</span>
            <div class="dle-gating-value" aria-labelledby="dle-gating-era">
                <span class="dle-gating-empty">Not set</span>
                <button class="menu_button menu_button_icon dle-gating-set" title="Set era" aria-label="Set era">
                    <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <div class="dle-gating-group" data-field="location">
            <span class="dle-gating-label" id="dle-gating-location">Location</span>
            <div class="dle-gating-value" aria-labelledby="dle-gating-location">
                <span class="dle-gating-empty">Not set</span>
                <button class="menu_button menu_button_icon dle-gating-set" title="Set location" aria-label="Set location">
                    <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <div class="dle-gating-group" data-field="sceneType">
            <span class="dle-gating-label" id="dle-gating-scene">Scene</span>
            <div class="dle-gating-value" aria-labelledby="dle-gating-scene">
                <span class="dle-gating-empty">Not set</span>
                <button class="menu_button menu_button_icon dle-gating-set" title="Set scene type" aria-label="Set scene type">
                    <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <div class="dle-gating-group" data-field="characterPresent">
            <span class="dle-gating-label" id="dle-gating-chars">Characters</span>
            <div class="dle-gating-value" aria-labelledby="dle-gating-chars">
                <span class="dle-gating-empty">None set</span>
                <button class="menu_button menu_button_icon dle-gating-set" title="Add character" aria-label="Add character">
                    <i class="fa-solid fa-plus" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ─── Tab: Tools ─── -->
    <div class="dle-tab-panel" id="dle-panel-tools" data-tab="tools"
         role="tabpanel" aria-labelledby="dle-tab-tools" hidden>

        <div class="dle-tools-group">
            <h3 class="dle-tools-group-label">Diagnostics</h3>
            <div class="dle-tools-grid">
                <button class="menu_button dle-tool-btn" data-action="health" title="Run health check on all entries">
                    <i class="fa-solid fa-heartbeat" aria-hidden="true"></i> Health Check
                </button>
                <button class="menu_button dle-tool-btn" data-action="inspect" title="Inspect last pipeline trace">
                    <i class="fa-solid fa-microscope" aria-hidden="true"></i> Inspect
                </button>
                <button class="menu_button dle-tool-btn" data-action="status" title="Full system status">
                    <i class="fa-solid fa-gauge-high" aria-hidden="true"></i> Status
                </button>
                <button class="menu_button dle-tool-btn" data-action="simulate" title="Simulate what entries would match">
                    <i class="fa-solid fa-flask" aria-hidden="true"></i> Simulate
                </button>
            </div>
        </div>

        <div class="dle-tools-group">
            <h3 class="dle-tools-group-label">AI Tools</h3>
            <div class="dle-tools-grid">
                <button class="menu_button dle-tool-btn" data-action="ai-review" title="Review AI search decisions">
                    <i class="fa-solid fa-magnifying-glass-chart" aria-hidden="true"></i> AI Review
                </button>
                <button class="menu_button dle-tool-btn" data-action="analytics" title="Session analytics">
                    <i class="fa-solid fa-chart-bar" aria-hidden="true"></i> Analytics
                </button>
                <button class="menu_button dle-tool-btn" data-action="notebook" title="AI Notebook (per-chat context)">
                    <i class="fa-solid fa-book" aria-hidden="true"></i> Notebook
                </button>
                <button class="menu_button dle-tool-btn" data-action="summarize" title="Generate entry summaries via AI">
                    <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i> Summarize
                </button>
            </div>
        </div>

        <div class="dle-tools-group">
            <h3 class="dle-tools-group-label">Data</h3>
            <div class="dle-tools-grid">
                <button class="menu_button dle-tool-btn" data-action="import-wi" title="Import World Info entries to Obsidian">
                    <i class="fa-solid fa-file-import" aria-hidden="true"></i> Import WI
                </button>
                <button class="menu_button dle-tool-btn" data-action="optimize-keys" title="Optimize entry keywords">
                    <i class="fa-solid fa-key" aria-hidden="true"></i> Optimize Keys
                </button>
                <button class="menu_button dle-tool-btn" data-action="graph" title="Visualize entry relationships">
                    <i class="fa-solid fa-diagram-project" aria-hidden="true"></i> Graph
                </button>
                <button class="menu_button dle-tool-btn" data-action="scribe-history" title="View Scribe history">
                    <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i> Scribe History
                </button>
            </div>
        </div>

        <div class="dle-tools-group">
            <h3 class="dle-tools-group-label">Setup</h3>
            <div class="dle-tools-grid">
                <button class="menu_button dle-tool-btn" data-action="setup" title="Guided setup wizard">
                    <i class="fa-solid fa-hat-wizard" aria-hidden="true"></i> Setup Wizard
                </button>
                <button class="menu_button dle-tool-btn" data-action="pins-blocks" title="View pins and blocks for this chat">
                    <i class="fa-solid fa-thumbtack" aria-hidden="true"></i> Pins/Blocks
                </button>
                <button class="menu_button dle-tool-btn" data-action="help" title="Help and documentation">
                    <i class="fa-solid fa-circle-info" aria-hidden="true"></i> Help
                </button>
            </div>
        </div>
    </div>
</div>
