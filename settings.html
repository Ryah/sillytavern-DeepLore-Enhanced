<div class="dle_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>DeepLore Enhanced</b>
            <span id="dle_header_badge" class="dle_header_badge"></span>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="dle_enabled" title="Enable or disable DeepLore Enhanced. When disabled, no entries are injected into prompts.">
                <input id="dle_enabled" type="checkbox" class="checkbox">
                <span>Enable DeepLore Enhanced</span>
            </label>
            <div id="dle_stub_status" class="dle-stub-status" style="margin: 6px 0; font-size: 0.85em; opacity: 0.7;">
                <!-- Status line populated by JS: "131 entries | Connected" -->
            </div>
            <div id="dle_open_settings" class="menu_button" role="button" tabindex="0" style="margin-top: 8px;">
                <i class="fa-solid fa-gear" aria-hidden="true"></i>
                <span>Open DeepLore Settings</span>
            </div>
        </div>
    </div>
</div>
